  1. カップラーメンの待ち時間が3分で語られる理由を扱うYouTubeタイトルを出典にした項目。短い待ち時間の裏に、麺の戻りや食べやすさの話題がある。

  2. ラムネ瓶のビー玉の理由を扱うYouTubeタイトルを出典にした項目。ビー玉は飾りではなく、炭酸の圧で飲み口をふさぐ仕組みと結びつく。

