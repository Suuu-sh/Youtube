  4. 鉛筆が六角形である理由を扱うYouTubeタイトルを出典にした項目。転がりにくさや持ちやすさを、身近な文房具の雑学として話せる。

  5. アイスクリームには賞味期限が無いというYouTubeタイトルを出典にした項目。冷凍で品質変化が起きにくい食品として、保存表示の話に広げられる。


