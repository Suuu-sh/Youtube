comment_text: |
  動画の補足👇

  1. 鳥肌は小さな筋肉が毛を立てる
  鳥肌は毛穴まわりの小さな筋肉が縮み、毛を立てることで起きる。

  2. 鼻はかなりの量の鼻水を作る
  鼻水は空気を湿らせたり、入ってきた異物を流したりするために作られる。

  3. 白髪は髪の色素が減ることで起きる
  髪の色はメラニン色素で決まり、その働きが弱まると白く見える。

  4. 胃は強い酸から自分を守っている
  胃の内側は粘膜で覆われ、胃酸で傷つきにくいように守られている。

  5. 睡眠不足は集中力にも影響する
  睡眠が足りないと眠気だけでなく、注意力や判断力も落ちやすい。

  いくつわかりましたか？
