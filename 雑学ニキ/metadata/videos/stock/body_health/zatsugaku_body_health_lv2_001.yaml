comment_text: |
  動画の補足👇
  
  1. 胃酸はかなり強い酸性で、食べ物を消化し病原体も抑える。
  2. 立毛筋が縮むことで毛穴まわりが盛り上がる。
  3. 成長しているのは毛根側で、外に出た髪は角化した細胞が中心。
  4. 睡眠圧は起きている時間とともに強くなり、体内時計と一緒に眠気を作る。
  5. 同じ刺激が続くと嗅覚の反応が下がり、匂いを感じにくくなる。
  
  いくつわかりましたか？
