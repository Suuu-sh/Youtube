comment_text: |
  動画の補足👇
  
  1. 頭痛、めまい、吐き気、眠気などで気づきにくい。
  2. 流れに逆らわず、岸と平行に泳いで抜けるのが基本。
  3. 光から音まで30秒以内なら安全な場所へ移動する目安。
  4. 湿度が高いと汗が蒸発しにくく、体の熱が逃げにくい。
  5. 子どもは少ない水でも溺れる危険がある。
  
  いくつわかりましたか？
