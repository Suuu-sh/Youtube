comment_text: |
  動画の補足👇

  1. 一酸化炭素はにおいも色もない
  一酸化炭素は気づきにくい危険なガスで、換気不足や燃焼器具の使用時に注意が必要。

  2. 離岸流は沖へ向かう強い流れ
  海岸から沖へ向かう流れで、水難事故に関わることが多い。横に逃げる行動が案内される。

  3. 雷の音は空気の急膨張で起きる
  雷は空気を一瞬で高温にし、その急膨張が大きな音になる。

  4. 砂浜の深い穴は崩れると危険
  深い穴は砂が崩れると脱出しにくく、埋没事故につながることがある。

  5. 暑さの油断は命に関わる
  高温環境では熱中症が起きやすく、水分補給や涼しい場所への移動が重要。

  いくつわかりましたか？
