comment_text: |
  【補足】
  1. 一酸化炭素はにおいも色もないため、気づきにくい危険がある。
  2. 離岸流は海岸から沖へ向かう強い流れで、水難事故に関わることが多い。
  3. 雷は空気を一瞬で高温にし、その急膨張が音になる。
  4. 砂浜の深い穴は崩れると脱出が難しく、かなり危険。
  5. 暑さを油断すると熱中症など命に関わることがある。

  いくつわかりましたか？
