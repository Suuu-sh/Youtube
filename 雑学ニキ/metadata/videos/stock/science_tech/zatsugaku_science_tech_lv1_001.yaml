comment_text: |
  【補足】
  1. 火星の1日は地球より少し長く、約24時間40分。
  2. GPSは複数の衛星から届く時刻情報を使い、現在地を計算する。
  3. 天王星や海王星では、内部の高圧環境でダイヤの雨がありうると考えられている。
  4. 青い系外惑星でも、青さの理由が地球の海とは限らない。
  5. GPSの時計は相対性理論の影響を補正して使われる。

  いくつわかりましたか？
