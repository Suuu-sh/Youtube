comment_text: |
  動画の補足👇
  
  1. 金星は自転がとても遅く、太陽を一周する時間より長い。
  2. 衛星と地上で時間の進み方が違うため、時計補正が必要。
  3. 加速度計やジャイロなどが傾きや動きを検出する。
  4. 炭素原子が規則正しく強く結びついた結晶構造。
  5. 後ろへガスを噴き出す反作用で進むため、真空でも動ける。
  
  いくつわかりましたか？
