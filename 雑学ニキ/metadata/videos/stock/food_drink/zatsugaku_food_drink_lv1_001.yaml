comment_text: |
  【補足】
  1. 玉ねぎを切ると細胞が壊れ、涙を呼ぶ刺激物が作られる。
  2. 冷凍食品は急速に凍るほど氷の粒が小さくなり、食感や味を保ちやすい。
  3. ヤムと呼ばれても、地域によってはサツマイモを指すことが多い。
  4. 冷凍焼けは焦げではなく、冷凍中の乾燥で起きる。
  5. 停電中の冷蔵庫は、開けないほど冷たさを保ちやすい。

  いくつわかりましたか？
