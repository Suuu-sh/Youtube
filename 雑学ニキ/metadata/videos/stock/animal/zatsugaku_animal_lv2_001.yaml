comment_text: |
  動画の補足👇
  
  1. 野生では短い睡眠をこま切れに取り、立ったまま休むこともある。
  2. 酸素を運ぶ成分がヘモグロビンではなくヘモシアニンなので青く見える。
  3. ヒゲは空気の動きや幅を感じる高感度の触覚器官。
  4. 鼻表面のしわや模様は犬ごとに違うと言われる。
  5. 毛に藻が生え、体を緑っぽく見せるカモフラージュにもなる。
  
  いくつわかりましたか？
