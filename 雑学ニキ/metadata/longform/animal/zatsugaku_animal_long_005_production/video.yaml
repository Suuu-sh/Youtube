description: |
  9割が知らない動物の雑学。

  ウォンバット、レッサーパンダ、ホッキョクグマ、ウーパールーパー、ミーアキャット、オオアリクイ、フェネック、マレーグマ、ハリモグラ、コモドドラゴンの雑学を、シンプルなカード形式で紹介。

  【詳細・補足】
  1. ウォンバットのフンが角ばる理由は、出口の形ではなく腸の動きと乾き方にあると考えられている。
  2. レッサーパンダの親指っぽい部分は本物の親指ではなく、竹をつかむために発達した手首の骨。
  3. ホッキョクグマの毛は白い色素ではなく、光を散らして白く見える。皮膚は黒い。
  4. ウーパールーパーは脚だけでなく、脳や心臓など幅広い組織の再生力で研究されている。
  5. ミーアキャットの黒い目元は、砂漠の強い日差しを減らすサングラスのような役目がある。
  6. オオアリクイは歯がなく、長く粘る舌でアリやシロアリを集める。
  7. フェネックの大きな耳は、音を聞くだけでなく砂漠の熱を逃がす放熱器にもなる。
  8. マレーグマの長い舌は、木の穴の奥にあるハチミツや虫を取るのに役立つ。
  9. ハリモグラは歯がなく、くちばしの先と粘る舌で虫を探して食べる。哺乳類なのに卵も産む。
  10. コモドドラゴンは世界最大のトカゲ。若い個体は木の上で暮らし、噛みつきの毒性は研究途中の部分もある。

