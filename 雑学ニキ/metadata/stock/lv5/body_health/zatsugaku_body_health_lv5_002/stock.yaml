description: |-
  知ってたら博士級 人体・健康の雑学 Lv5

  【詳細・補足】
  1. 心臓には洞房結節というペースメーカー役があり、電気信号が広がって収縮の順番をそろえる。リズムが乱れると脈の異常として現れる。
  2. 肺胞は小さな袋が大量に集まった構造で、表面積を広げている。薄い壁を挟んで酸素と二酸化炭素が入れ替わる。
  3. 筋肉ではアクチンとミオシンという細い構造が滑り合い、短くなる力が生まれる。脳や神経の指令、カルシウムの動きも関わる。
  4. 骨は一度できたら終わりではなく、古い部分を壊す細胞と新しく作る細胞が働く。運動や栄養、ホルモンの影響も受ける。
  5. 睡眠中の脳では、老廃物を流す仕組みが働きやすいとされる。記憶整理や疲労回復とも関係するため、短すぎる睡眠は負担になる。

