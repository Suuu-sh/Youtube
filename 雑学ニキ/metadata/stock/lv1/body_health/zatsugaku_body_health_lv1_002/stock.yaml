comment_text: |
  動画の補足👇
  
  1. まばたきは涙を広げる
  まばたきで涙の膜が広がり、目の表面を乾燥やほこりから守りやすくなる。
  
  2. 耳あかは汚れだけではない
  耳の中を保湿し、ほこりや小さな異物を捕まえる働きがある。
  
  3. 皮膚は新陳代謝する
  外側の古い細胞がはがれ、下から新しい細胞が上がってくることで表面が保たれる。
  
  4. 血液は体内の運搬役
  赤血球が酸素を運び、血しょうは栄養や老廃物などの移動にも関わる。
  
  5. 味蕾は乳頭の中にある
  舌の表面の小さな突起の中に味蕾があり、甘味や酸味などを感じ取る。
  
  いくつわかりましたか？
  
