comment_text: |
  動画の補足👇
  
  1. 猫のひげは高性能センサー
  ひげの根元には神経が多く、空気の動きやすき間の幅を感じ取る助けになる。
  
  2. 犬の鼻紋は一頭ごとに違う
  鼻先のしわ模様は犬ごとに違うため、識別に使えるほど特徴が出る。
  
  3. キリンの長い舌は食事向き
  高い枝の葉を巻き取るため、長くて動かしやすい舌を持つ。黒っぽい色は日差し対策とも言われる。
  
  4. ナマケモノは省エネ型
  葉を主に食べ、ゆっくりした代謝で生活するため、消化にも長い時間がかかる。
  
  5. ゴロゴロ音は複数の場面で出る
  リラックス時だけでなく、緊張や痛みの場面でも出ることがあり、状態全体を見るのが大事。
  
  いくつわかりましたか？
  
