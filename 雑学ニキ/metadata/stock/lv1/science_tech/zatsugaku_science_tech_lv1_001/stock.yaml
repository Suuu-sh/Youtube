comment_text: "動画の補足\U0001F447\n\n1. 火星の1日は地球より少し長い\n火星の1日は約24時間40分で、地球の1日より少しだけ長い。\n\n2.
  GPSは複数の衛星で位置を計算する\n複数の衛星から届く時刻情報を使い、現在地を計算している。\n\n3. 天王星や海王星ではダイヤの雨がありうる\n内部の高圧環境で炭素がダイヤのような形になり、雨のように沈む可能性が考えられている。\n\n4.
  青い惑星でも海があるとは限らない\n系外惑星の青さは大気や雲などが理由の場合もあり、地球のような海とは限らない。\n\n5. GPSの時計は相対性理論を補正している\n衛星の時計は重力や速度の影響を受けるため、補正しないと位置情報がずれていく。\n\nいくつわかりましたか？\n"
