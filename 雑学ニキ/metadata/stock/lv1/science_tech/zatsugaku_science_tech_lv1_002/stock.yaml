  【詳細・補足】
  1. 磁石は磁場を作る
  磁石の周りには磁場があり、鉄など特定の物質に力を及ぼす。

  2. 電池は化学エネルギーを使う
  内部の反応で電子の流れを作り、機器を動かす電気として取り出す。

  3. Wi-Fiは無線通信
  ケーブルの代わりに電波を使い、スマホやパソコンとルーターの間でデータをやり取りする。

  4. 電子レンジはマイクロ波を使う
  食品中の水分などがマイクロ波の影響で動き、熱が生まれて温まる。

  5. 雲は水滴や氷晶でできる
  空気中の水蒸気が冷えて、小さな水滴や氷の粒になって空に浮かぶ。

