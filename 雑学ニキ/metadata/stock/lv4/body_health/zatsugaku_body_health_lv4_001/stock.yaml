description: |-
  人体・健康の仕組みを深めに知るLv4雑学を短く紹介。

  【詳細・補足】
  1. 体内時計は 光で毎日 合わせ直される
  体のリズムは脳の時計に強く支えられ、朝の光が時刻合わせの大きな手がかりになる。夜の強い光は眠るタイミングを後ろへずらすことがある。

  2. 睡眠中の脳は 老廃物を流す 動きが強まる
  睡眠中は脳内の液体の流れが変わり、不要な物質を片づける働きが注目される。眠りが大事な理由は休むだけではない。

  3. 肺胞は 酸素交換用の 極小ポケット
  肺の奥には肺胞という小さな袋が大量にあり、薄い壁ごしに酸素と二酸化炭素をやり取りする。表面積を広げる構造が呼吸を支える。

  4. 心臓の拍動は 電気信号で 順番に伝わる
  心臓には刺激伝導系があり、洞房結節から始まる信号で筋肉が協調して動く。リズムが乱れると脈の異常につながる。

  5. 皮膚の常在菌は 外敵から守る 味方にもなる
  皮膚には多くの微生物がすみ、場所によって種類も変わる。バランスの取れた常在菌は、外から来る菌が増えすぎるのを抑える助けになる。

