  【詳細・補足】
  1. 今の1秒は 原子の振動で 決まる
  セシウム原子の特定の振動回数を基準に、現代の1秒が定義されている。

  2. GPSは 相対性理論なしだと ズレる
  衛星と地上では時計の進み方がわずかに違い、補正しないと位置情報がズレる。

  3. 最先端の時計は 宇宙規模でも ほぼズレない
  原子時計は日常には過剰なほど正確で、通信や物理実験にも使われる。

  4. 高さ10cmでも 時間の差を 測れる
  高精度な時計では、重力の違いによるわずかな時間差まで測れる。

  5. 発明は ひとつから 特許が広がる
  急速冷凍のように、一つの発想が包装や装置など多くの特許へ広がることがある。

