  【詳細・補足】
  1. 磁石は見えない磁場を作る
  磁場が周囲に広がり、鉄などに力を及ぼす。

  2. 電池は化学反応で電気を取り出す
  内部の化学反応で電子の流れを作り、機器を動かす。

  3. 無線通信は電磁波で情報を送る
  スマホやWi-Fiなどは電磁波を使って情報を送受信する。

  4. 電子レンジは水分子などを動かして温める
  マイクロ波が食品中の水分子などを動かし、その動きで熱が生まれる。

  5. 雲は水蒸気が冷えてできる
  空気中の水蒸気が冷え、小さな水滴や氷の粒になって雲になる。

