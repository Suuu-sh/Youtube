description: |-
  科学・テクノロジーにまつわる知ってたらちょっとすごい雑学を短く紹介。

  【詳細・補足】
  1. GPSは 衛星の時刻差で 場所を出す
  GPS端末は、複数の衛星から届く電波の到着時間を比べて距離を計算する。最低でも複数衛星との距離差が必要で、時計のズレも同時に補正する。地図上の一点は、時間をかなり正確に測る技術で決まっている。

  2. ロケットは 空気がなくても 進める
  ロケットは燃料だけでなく酸化剤も積み、自分の中で燃焼に必要な材料をそろえる。高温のガスを後ろへ噴き出すと、反作用で本体が前へ進む。空気を押しているのではなく、噴射した質量とのやり取りで進む。

  3. ダイヤモンドは 熱をかなり 伝えやすい
  ダイヤモンドは硬いだけでなく、熱を逃がす能力も高い材料。原子が強く規則的に結びついた結晶構造で、熱の振動が伝わりやすい。電子部品の放熱材料として注目される理由もここにある。

  4. 水銀は 常温で液体の 金属
  多くの金属は室温で固体だが、水銀は常温付近で液体のまま存在する。原子同士の結びつき方が弱めで、融点が低いことが理由。扱いやすそうに見えても有害性があり、こぼれた水銀は専門的な処理が必要になる。

  5. 一酸化炭素センサーは 見えない毒を 検知する
  一酸化炭素は色もにおいもないため、人の感覚では発見しにくい。センサーは電気化学式などの仕組みで濃度変化を検知し、危険な量に近づくと警報を出す。火気や暖房の安全対策を機械で補う道具。

