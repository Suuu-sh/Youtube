description: |-
  動物にまつわる知ってたらちょっとすごい雑学を短く紹介。

  【詳細・補足】
  1. 犬の鼻には 個体ごとの 模様がある
  鼻先のしわや凹凸は犬ごとに違い、鼻紋として識別に使われることがある。

  2. コウモリは 逆さまで 休みやすい
  足の腱が体重でロックされるため、力を入れ続けなくてもぶら下がりやすい。

  3. カモノハシは 電気の刺激を 感じ取る
  くちばしの感覚器で、獲物の筋肉が出す弱い電気信号を探る。

  4. キリンの首の骨は 人間と同じ 7個
  首はとても長いが、頸椎の数は多くの哺乳類と同じ7個で、1個ずつが長い。

  5. ナマケモノは 省エネ生活が かなり得意
  動きが遅いことで消費エネルギーを抑え、葉を中心にした低カロリーな食生活に合っている。

  いくつわかりましたか？

