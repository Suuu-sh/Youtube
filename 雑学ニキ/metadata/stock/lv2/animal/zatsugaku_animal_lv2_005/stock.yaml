description: |-
  動物にまつわる知ってたらちょっとすごい雑学を短く紹介。

  【詳細・補足】
  1. ハリネズミの針は 毛が硬く 変化したもの
  針は体を守るための硬い毛で、危険を感じると体を丸めて守りを固める。

  2. カメレオンの舌は 体より長く 伸びることがある
  種類によって差はあるが、遠くの虫をすばやく捕まえるために舌を勢いよく伸ばす。

  3. カンガルーの赤ちゃんは 袋の中で 大きく育つ
  生まれた直後はとても小さく、母親のお腹の袋に入って成長を続ける。

  4. ラッコは 流されないよう 手をつなぐことがある
  休むときに仲間と手をつないだり海藻につかまったりして、同じ場所にとどまりやすくする。

  5. カピバラは 泳ぎが かなり得意
  水辺で暮らすことが多く、足の形や体のつくりが泳ぎやすい生活に合っている。

  いくつわかりましたか？

