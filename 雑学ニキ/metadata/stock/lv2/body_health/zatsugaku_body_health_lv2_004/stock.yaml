  人体・健康にまつわる知ってたらちょっとすごい雑学を短く紹介。

  【詳細・補足】
  1. 鼻は 空気を温めて 体に入れる
  鼻の中は空気に湿り気と温度を与え、のどや肺に入る前の調整役になる。

  2. 皮膚は 体を守る 大きなバリア
  外からの刺激や微生物を防ぎ、水分が逃げすぎるのも抑える。

  3. 血液は 酸素を 全身へ運ぶ
  赤血球のヘモグロビンが酸素を結びつけ、体の細胞へ届ける。

  4. 舌は 味だけでなく 温度も感じる
  舌には味覚だけでなく触覚や温度の感覚もあり、食感や熱さの判断に関わる。

  5. 睡眠は 記憶の整理にも 関わる
  眠っている間に、起きている間の情報を整理する働きが研究されている。

