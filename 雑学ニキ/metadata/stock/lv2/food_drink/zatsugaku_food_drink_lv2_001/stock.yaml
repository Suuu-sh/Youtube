description: |-
  食べ物・飲み物にまつわる知ってたらちょっとすごい雑学を短く紹介。

  【詳細・補足】
  1. ホワイトチョコは茶色いカカオ固形分が少ない
  ココアバターを使うが、茶色いカカオ固形分は基本的に入らない。

  2. はちみつは腐りにくい
  水分が少なく酸性寄りの性質があり、微生物が増えにくい。

  3. バナナは熟すと甘くなる
  熟成ででんぷんが糖に変わり、甘さを感じやすくなる。

  4. 唐辛子の辛さは痛みの刺激
  カプサイシンが熱や痛みに関わる受容体を刺激して、辛く感じる。

  5. 炭酸の泡は圧力が下がると出る
  フタを開けると圧力が下がり、溶けていた二酸化炭素が気体の泡として出る。

  いくつわかりましたか？

