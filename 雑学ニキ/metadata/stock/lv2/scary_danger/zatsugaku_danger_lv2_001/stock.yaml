  怖い・危険にまつわる知ってたらちょっとすごい雑学を短く紹介。

  【詳細・補足】
  1. 火事では煙がかなり危険
  煙には有毒ガスや熱が含まれ、吸い込むと短時間で危険な状態になる。

  2. 地震ではまず身を守る
  Drop, Cover, and Hold On が基本行動として案内され、落下物から頭や体を守る。

  3. ハチ刺され後の全身症状は危険サイン
  呼吸困難や全身のじんましんなどはアレルギー反応の可能性があり、すぐ対応が必要。

  4. 毒キノコは見た目で判断しにくい
  食用と毒キノコは似ていることがあり、自己判断で食べるのは危険。

  5. ホームでは黄色線の内側に立つ
  靴や衣服がすき間に巻き込まれる事故を避けるため、電車から距離を取る。

